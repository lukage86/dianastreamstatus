name: Update YouTube Status

on:
  workflow_dispatch:
  schedule:
    # Every 10 minutes on Thursdays, 4 PM - 9 PM Central
    # GitHub cron uses UTC
    - cron: "*/10 21-23 * * 4"
    - cron: "*/10 0-2 * * 5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check YouTube streams page and update status
        run: |
          python <<'PY'
          import json
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          CHANNEL = "DianaOfTheRose"
          CHANNEL_ID = "UC_NhJlZOgfz09jA1QxY1S6Q"
          STREAMS_URL = "https://www.youtube.com/@DianaOfTheRose/streams"
          OUTPUT = Path("data/youtube-status.json")

          def now_utc():
              return datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          def fetch(url):
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "Mozilla/5.0",
                      "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
                      "Accept-Language": "en-US,en;q=0.9",
                  },
              )
              with urllib.request.urlopen(req, timeout=20) as res:
                  return res.read().decode("utf-8", errors="replace")

          html = fetch(STREAMS_URL)

          live_patterns = [
              r'"style":"LIVE"',
              r'"text":"LIVE"',
              r'"label":"LIVE"',
              r'LIVE NOW',
              r'watching now',
              r'isLiveNow":true',
              r'"isLive":true',
          ]

          is_live = any(re.search(pattern, html, re.IGNORECASE) for pattern in live_patterns)

          title_match = re.search(r'<title>(.*?)</title>', html, re.IGNORECASE | re.DOTALL)
          page_title = title_match.group(1).strip() if title_match else ""

          data = {
              "platform": "youtube",
              "channel": CHANNEL,
              "channelId": CHANNEL_ID,
              "streamsUrl": STREAMS_URL,
              "checkedAt": now_utc(),
              "live": is_live,
              "status": "live" if is_live else "not-live",
              "message": "Diana appears to be live on YouTube." if is_live else "No live stream detected on Diana's YouTube streams page.",
              "pageTitle": page_title
          }

          OUTPUT.parent.mkdir(parents=True, exist_ok=True)
          OUTPUT.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")

          print(json.dumps(data, indent=2))
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/youtube-status.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update YouTube status"
          git push
