name: Update YouTube Status

on:
  workflow_dispatch:
  schedule:
    # Every 10 minutes on Thursdays, 4 PM - 9 PM Central
    # GitHub cron uses UTC. This covers roughly 4-9 PM CDT.
    - cron: "*/10 21-23 * * 4"
    - cron: "*/10 0-2 * * 5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check YouTube RSS and update status
        run: |
          python <<'PY'
          import json
          import re
          import urllib.request
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone
          from pathlib import Path

          HANDLE_URL = "https://www.youtube.com/@DianaOfTheRose"
          STREAMS_URL = "https://www.youtube.com/@DianaOfTheRose/streams"
          OUTPUT = Path("data/youtube-status.json")

          def now_utc():
              return datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          def fetch(url):
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "Mozilla/5.0",
                      "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
                  },
              )
              with urllib.request.urlopen(req, timeout=20) as res:
                  return res.read().decode("utf-8", errors="replace")

          def get_channel_id():
              html = fetch(HANDLE_URL)
              patterns = [
                  r'"channelId":"(UC[^"]+)"',
                  r'"externalId":"(UC[^"]+)"',
                  r'<meta itemprop="channelId" content="(UC[^"]+)">',
              ]

              for pattern in patterns:
                  match = re.search(pattern, html)
                  if match:
                      return match.group(1)

              raise RuntimeError("Could not find channel ID from YouTube handle page.")

          def read_feed(channel_id):
              feed_url = f"https://www.youtube.com/feeds/videos.xml?channel_id={channel_id}"
              xml = fetch(feed_url)

              ns = {
                  "atom": "http://www.w3.org/2005/Atom",
                  "yt": "http://www.youtube.com/xml/schemas/2015",
                  "media": "http://search.yahoo.com/mrss/",
              }

              root = ET.fromstring(xml)
              entries = []

              for entry in root.findall("atom:entry", ns):
                  video_id = entry.findtext("yt:videoId", default="", namespaces=ns)
                  title = entry.findtext("atom:title", default="", namespaces=ns)
                  published = entry.findtext("atom:published", default="", namespaces=ns)
                  updated = entry.findtext("atom:updated", default="", namespaces=ns)

                  link_el = entry.find("atom:link", ns)
                  url = link_el.attrib.get("href") if link_el is not None else f"https://www.youtube.com/watch?v={video_id}"

                  entries.append({
                      "videoId": video_id,
                      "title": title,
                      "url": url,
                      "published": published,
                      "updated": updated,
                  })

              return entries

          channel_id = get_channel_id()
          entries = read_feed(channel_id)

          latest = entries[0] if entries else None

          data = {
              "platform": "youtube",
              "channel": "DianaOfTheRose",
              "channelId": channel_id,
              "streamsUrl": STREAMS_URL,
              "checkedAt": now_utc(),
              "hasRecentVideo": bool(latest),
              "live": False,
              "status": "unknown",
              "message": "Check Diana's YouTube streams page.",
              "latest": latest,
          }

          if latest:
              title = latest["title"].lower()
              updated = latest.get("updated") or ""

              # RSS cannot perfectly prove live state.
              # This flags likely Thursday/live-stream content for the website.
              live_words = ["live", "stream", "strem", "thursday"]
              likely_stream = any(word in title for word in live_words)

              data["status"] = "likely-stream" if likely_stream else "recent-video"
              data["message"] = (
                  "Diana may be live or recently posted a Thursday stream on YouTube."
                  if likely_stream
                  else "No clear live stream found in the latest YouTube RSS item."
              )

          OUTPUT.parent.mkdir(parents=True, exist_ok=True)
          OUTPUT.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")

          print(json.dumps(data, indent=2))
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/youtube-status.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update YouTube status"
          git push
