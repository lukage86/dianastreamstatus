name: Update Charity Timestamp

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Update charity.json from Tiltify page
        run: |
          python <<'PY'
          import json
          import re
          from datetime import datetime, timezone

          import requests
          from bs4 import BeautifulSoup

          FILE = "data/charity.json"

          def now_utc():
              return datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          def fetch_tiltify_total(url: str) -> float:
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
              }

              response = requests.get(url, headers=headers, timeout=30)
              response.raise_for_status()

              html = response.text
              soup = BeautifulSoup(html, "lxml")

              # 1) Best match: find text node "Raised" and inspect nearby parent block text
              raised_nodes = soup.find_all(string=re.compile(r'^\s*Raised\s*$', re.I))
              for node in raised_nodes:
                  parent = node.parent
                  for _ in range(4):
                      if parent is None:
                          break
                      block_text = parent.get_text(" ", strip=True)
                      m = re.search(r'\$([0-9][0-9,]*\.?[0-9]{0,2})', block_text)
                      if m:
                          return float(m.group(1).replace(",", ""))
                      parent = parent.parent

              # 2) Fallback: search raw HTML for "Raised" followed reasonably soon by a dollar amount
              patterns = [
                  r'Raised.{0,500}?\$([0-9][0-9,]*\.?[0-9]{0,2})',
                  r'>Raised<.{0,500}?\$([0-9][0-9,]*\.?[0-9]{0,2})',
              ]

              for pattern in patterns:
                  m = re.search(pattern, html, re.I | re.S)
                  if m:
                      return float(m.group(1).replace(",", ""))

              # 3) Fallback: inspect visible text lines and find a line containing Raised
              text = soup.get_text("\n", strip=True)
              lines = [line.strip() for line in text.splitlines() if line.strip()]
              for i, line in enumerate(lines):
                  if line.lower() == "raised" or "raised" in line.lower():
                      window = " ".join(lines[i:i+5])
                      m = re.search(r'\$([0-9][0-9,]*\.?[0-9]{0,2})', window)
                      if m:
                          return float(m.group(1).replace(",", ""))

              raise RuntimeError("Could not find fundraiser total on Tiltify page.")

          with open(FILE, "r", encoding="utf-8") as f:
              data = json.load(f)

          data["lastChecked"] = now_utc()

          if data.get("active") is True:
              url = data.get("url")
              if not url:
                  raise RuntimeError("No URL found in data/charity.json")

              total = fetch_tiltify_total(url)
              data["raised"] = round(total, 2)
              print(f"Updated raised to {data['raised']}")
          else:
              print("Charity inactive — updated lastChecked only")

          with open(FILE, "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/charity.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update charity from Tiltify page"
          git push
