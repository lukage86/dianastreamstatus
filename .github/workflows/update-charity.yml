name: Update Charity Timestamp

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install chromium

      - name: Update charity.json from Tiltify page
        run: |
          python <<'PY'
          import json
          import re
          from datetime import datetime, timezone
          from playwright.sync_api import sync_playwright

          FILE = "data/charity.json"

          def now_utc():
              return datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          def extract_money(text):
              if not text:
                  return None
              m = re.search(r'\$([0-9][0-9,]*\.?[0-9]{0,2})', text)
              if not m:
                  return None
              return float(m.group(1).replace(",", ""))

          def fetch_tiltify_total(url):
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  page = browser.new_page()

                  page.goto(url, wait_until="domcontentloaded", timeout=60000)
                  page.wait_for_timeout(8000)

                  body_text = page.locator("body").inner_text()

                  patterns = [
                      r'Raised\s*\$([0-9][0-9,]*\.?[0-9]{0,2})',
                      r'Raised\s+.*?\$([0-9][0-9,]*\.?[0-9]{0,2})',
                      r'\$([0-9][0-9,]*\.?[0-9]{0,2})\s*Raised',
                  ]

                  for pattern in patterns:
                      m = re.search(pattern, body_text, re.I | re.S)
                      if m:
                          browser.close()
                          return float(m.group(1).replace(",", ""))

                  candidate_selectors = [
                      "text=/^Raised$/i",
                      "text=/Raised/i"
                  ]

                  for selector in candidate_selectors:
                      locs = page.locator(selector)
                      count = locs.count()

                      for i in range(count):
                          try:
                              el = locs.nth(i)

                              texts_to_try = [
                                  el.inner_text(),
                                  el.locator("xpath=..").inner_text(),
                                  el.locator("xpath=../..").inner_text(),
                                  el.locator("xpath=../../..").inner_text(),
                              ]

                              for txt in texts_to_try:
                                  amt = extract_money(txt)
                                  if amt is not None:
                                      browser.close()
                                      return amt
                          except Exception:
                              pass

                  print("DEBUG: first 4000 chars of rendered body text:")
                  print(body_text[:4000])

                  browser.close()
                  raise RuntimeError(f"Could not find fundraiser total on Tiltify page: {url}")

          with open(FILE, "r", encoding="utf-8") as f:
              data = json.load(f)

          data["lastChecked"] = now_utc()

          if data.get("active") is True:
              url = data.get("url")
              if not url:
                  raise RuntimeError("No URL found in data/charity.json")

              total = fetch_tiltify_total(url)
              data["raised"] = round(total, 2)
              print(f"Updated active charity total to {data['raised']}")
          else:
              print("Charity inactive — updated lastChecked only")

          with open(FILE, "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write("\n")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/charity.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update charity from Tiltify page"
          git push
